# ============================================
# TMUX CONFIGURATION
# ============================================

# --- TERMINAL & TRUE COLOR ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -ag terminal-overrides ",*:Tc"

# --- GENERAL ---
set -g mouse on
setw -g mode-keys vi
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on
set -g extended-keys on
set -g default-shell ZSHELL_PATH

# --- COPY-PASTE (OSC 52 only - no external tools needed) ---
# OSC 52: terminal-native clipboard, works over SSH
set -s set-clipboard on

# --- DEFAULT COLORS (Cobalt) ---
set -g status-style 'bg=#1c212b,fg=#8fbcbb'
set -g status-justify centre
set -g status-left-length 40
set -g status-right-length 80
set -g status-left '#[bold] [#S] #[nobold]'
set -g status-right '#[nobold] #{b:pane_current_path} #[bold]%H:%M #[nobold]'

setw -g window-status-style 'bg=#1c212b,fg=#4c566a'
setw -g window-status-current-style 'bg=#1c212b,fg=#8fbcbb,bold'
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format ' #I:#W* '

set -g window-style 'bg=#1c212b,fg=#9aa3b0'
set -g window-active-style 'bg=#1c212b,fg=#d8dee9'

set -g pane-border-style 'fg=#2e3440,bg=#1c212b'
set -g pane-active-border-style 'fg=#5e81ac,bg=#1c212b'
set -g pane-border-lines single

set -g message-style 'bg=#2e3440,fg=#eceff4'

# --- SESSION-BASED THEMING ---
set-hook -g after-new-session 'run-shell -b "~/.tmux/apply-theme-hook.sh"'

# --- KEYBINDS ---
# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Split panes keeping current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# New window keeping current path
bind c new-window -c "#{pane_current_path}"

# --- PLUGINS (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# REMOVED: tmux-yank - causes conflict with OSC 52
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

run '~/.tmux/plugins/tpm/tpm'

# --- VI COPY-MODE (OSC 52 via copy-selection-and-cancel) ---
bind -T copy-mode-vi v              send-keys -X begin-selection
bind -T copy-mode-vi C-v            send-keys -X rectangle-toggle
bind -T copy-mode-vi y              send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Enter          send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape         send-keys -X clear-selection

# Paste from clipboard (in normal mode)
bind p paste-buffer

# --- DUAL STATUS BAR ---
set -g status 2
set -g status-right '#[nobold] #{b:pane_current_path} #[bold]%H:%M #[nobold]'
set -g status-format[1] '#[align=centre,fg=#3b4252,bg=default,italics] C-b: #[fg=#4c566a,bg=default]| split-h  - split-v  c new-win  n/p nav  d detach  z zoom  x kill-pane  s sessioni  $ rename'
