# Starship configuration
# Style: neutral, professional, theme-adaptive
# Compatibile con tutti i temi tmux (cobalt, green, blue, purple, orange, red, nord, everforest, gruvbox)
# Non richiede Nerd Font

command_timeout = 500

format = """$username$hostname $directory $git_branch$git_status$git_state $character"""
right_format = """$python"""

[character]
success_symbol = "[\\$](bold)"
error_symbol = "[\\$](bold #cc7832)"

[username]
style_user = "bold"
style_root = "bold #cc7832"
format = "[$user@]($style)"
disabled = false
show_always = false

[hostname]
ssh_only = false
format = "[$hostname]($style)"
style = ""
disabled = false

[directory]
truncation_length = 3
truncate_to_repo = true
format = "[$read_only]($read_only_style)[$path]($style)"
style = "bold"
read_only = " 󰌾"
home_symbol = "~"

[git_branch]
format = "[$branch ]($style)"
style = "dimmed"

[git_status]
format = '([\($all_status$ahead_behind\)]($style))'
style = "dimmed"
conflicted = "!"
ahead = "↑"
behind = "↓"
diverged = "↕"
untracked = ""
stashed = ""
modified = "*"
staged = "+"
renamed = ""
deleted = "-"

[git_state]
format = ' \([$state( $progress_current/$progress_total)]($style)\)'
style = "dimmed"
rebase = "rebase"
merge = "merge"
revert = "revert"
cherry_pick = "cherry-pick"
bisect = "bisect"
am = "am"
am_or_rebase = "am/rebase"

[python]
symbol = ""
format = "[(($virtualenv))]($style)"
style = "dimmed"
detect_extensions = ["py"]
detect_files = [".python-version", "Pipfile", "requirements.txt", "pyproject.toml", "setup.py"]
detect_folders = []

[cmd_duration]
disabled = true

[time]
disabled = true
